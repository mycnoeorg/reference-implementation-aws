apiVersion: tf.upbound.io/v1beta1
kind: Workspace
metadata:
  name: cgu-tf-dynamodb
  annotations:
    crossplane.io/external-name: cgu-dynamodb-module
spec:
  forProvider:
    source: Inline
    # Módulo Terraform "legado" que provisiona uma tabela DynamoDB real.
    # Demonstra o padrão do anexo §5 Fase 1 (encapsulamento):
    # módulo HCL arbitrário agora vira recurso Kubernetes reconciliável.
    module: |
      terraform {
        required_providers {
          aws = { source = "hashicorp/aws", version = "~> 5.0" }
        }
      }

      provider "aws" {
        region = var.region
      }

      variable "region" {
        type    = string
        default = "us-west-1"
      }

      variable "prefix" {
        type    = string
        default = "cgu"
      }

      variable "environment" {
        type    = string
        default = "demo"
      }

      resource "aws_dynamodb_table" "app_table" {
        name         = "${var.prefix}-legacy-table"
        billing_mode = "PAY_PER_REQUEST"
        hash_key     = "PK"
        range_key    = "SK"

        attribute {
          name = "PK"
          type = "S"
        }

        attribute {
          name = "SK"
          type = "S"
        }

        tags = {
          Name        = "${var.prefix}-legacy-table"
          Environment = var.environment
          ManagedBy   = "crossplane-provider-terraform"
          Compliance  = "cgu-anexo"
        }
      }

      output "table_name" {
        value = aws_dynamodb_table.app_table.name
      }

      output "table_arn" {
        value = aws_dynamodb_table.app_table.arn
      }

      output "table_id" {
        value = aws_dynamodb_table.app_table.id
      }
    vars:
      - key: prefix
        value: "cgu-anexo"
      - key: region
        value: "us-west-1"
      - key: environment
        value: "demo"
  writeConnectionSecretToRef:
    namespace: default
    name: cgu-tf-dynamodb-outputs
  providerConfigRef:
    name: default
