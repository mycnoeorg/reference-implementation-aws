# Composition: Multi-cloud data pipeline
# Composes AWS DynamoDB + GCP Pub/Sub via provider-terraform Workspaces
# Demonstrates §6 (heterogeneous composition) and §5 (Terraform encapsulation)
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: multicloud-pipeline.awsblueprints.io
  labels:
    awsblueprints.io/provider: multicloud
    awsblueprints.io/environment: dev
spec:
  writeConnectionSecretsToNamespace: crossplane-system
  compositeTypeRef:
    apiVersion: awsblueprints.io/v1alpha1
    kind: XMultiCloudPipeline
  resources:
    # --- AWS DynamoDB Table (via provider-terraform) ---
    - name: aws-dynamodb
      base:
        apiVersion: tf.upbound.io/v1beta1
        kind: Workspace
        metadata:
          annotations:
            crossplane.io/external-name: multicloud-dynamodb
        spec:
          forProvider:
            source: Inline
            module: |
              terraform {
                required_providers {
                  aws = { source = "hashicorp/aws", version = "~> 5.0" }
                }
              }

              provider "aws" {
                region = var.region
              }

              variable "region" {
                type    = string
                default = "us-west-1"
              }

              variable "prefix" {
                type    = string
                default = "cgu"
              }

              variable "environment" {
                type    = string
                default = "demo"
              }

              resource "aws_dynamodb_table" "pipeline_table" {
                name         = "${var.prefix}-pipeline-events"
                billing_mode = "PAY_PER_REQUEST"
                hash_key     = "PK"
                range_key    = "SK"

                attribute {
                  name = "PK"
                  type = "S"
                }

                attribute {
                  name = "SK"
                  type = "S"
                }

                tags = {
                  Name        = "${var.prefix}-pipeline-events"
                  Environment = var.environment
                  ManagedBy   = "crossplane-composition"
                  Compliance  = "cgu-anexo"
                }
              }

              output "table_name" {
                value = aws_dynamodb_table.pipeline_table.name
              }

              output "table_arn" {
                value = aws_dynamodb_table.pipeline_table.arn
              }
            vars:
              - key: prefix
                value: ""
              - key: region
                value: ""
              - key: environment
                value: ""
          providerConfigRef:
            name: default
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.prefix
          toFieldPath: spec.forProvider.vars[0].value
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.aws.region
          toFieldPath: spec.forProvider.vars[1].value
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.vars[2].value
      readinessChecks:
        - type: MatchCondition
          matchCondition:
            type: Ready
            status: "True"

    # --- GCP Pub/Sub Topic + Subscription (via provider-terraform) ---
    - name: gcp-pubsub
      base:
        apiVersion: tf.upbound.io/v1beta1
        kind: Workspace
        metadata:
          annotations:
            crossplane.io/external-name: multicloud-pubsub
        spec:
          forProvider:
            source: Inline
            module: |
              terraform {
                required_providers {
                  google = { source = "hashicorp/google", version = "~> 6.0" }
                }
              }

              provider "google" {
                project     = var.project_id
                region      = var.region
                credentials = file("gcp-credentials.json")
              }

              variable "project_id" {
                type = string
              }

              variable "region" {
                type    = string
                default = "us-central1"
              }

              variable "prefix" {
                type    = string
                default = "cgu"
              }

              variable "environment" {
                type    = string
                default = "demo"
              }

              resource "google_pubsub_topic" "pipeline_events" {
                name = "${var.prefix}-pipeline-events"

                labels = {
                  environment = var.environment
                  managed-by  = "crossplane-composition"
                  compliance  = "cgu-anexo"
                }

                message_retention_duration = "86400s"
              }

              resource "google_pubsub_subscription" "pipeline_sub" {
                name  = "${var.prefix}-pipeline-events-sub"
                topic = google_pubsub_topic.pipeline_events.id

                ack_deadline_seconds       = 20
                message_retention_duration = "604800s"

                labels = {
                  environment = var.environment
                  managed-by  = "crossplane-composition"
                }
              }

              output "topic_name" {
                value = google_pubsub_topic.pipeline_events.name
              }

              output "topic_id" {
                value = google_pubsub_topic.pipeline_events.id
              }

              output "subscription_name" {
                value = google_pubsub_subscription.pipeline_sub.name
              }
            vars:
              - key: prefix
                value: ""
              - key: project_id
                value: ""
              - key: region
                value: ""
              - key: environment
                value: ""
          providerConfigRef:
            name: gcp
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.prefix
          toFieldPath: spec.forProvider.vars[0].value
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.gcp.projectId
          toFieldPath: spec.forProvider.vars[1].value
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.gcp.region
          toFieldPath: spec.forProvider.vars[2].value
        - type: FromCompositeFieldPath
          fromFieldPath: spec.parameters.environment
          toFieldPath: spec.forProvider.vars[3].value
      readinessChecks:
        - type: MatchCondition
          matchCondition:
            type: Ready
            status: "True"
